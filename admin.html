<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сканер (ручной) + Поиск</title>
<style>
body{background:#0f1115;color:#fff;font-family:Arial,sans-serif;margin:0}
.wrap{max-width:820px;margin:auto;padding:20px}
.block{background:#151922;padding:20px;border-radius:16px;margin-bottom:16px;border:1px solid #2b313b}
h1,h2,h3{margin:0 0 12px}
input{width:100%;padding:14px 16px;font-size:20px;background:#0f1115;color:#fff;border:1px solid #333;border-radius:12px}
button{padding:12px 16px;margin-top:10px;margin-right:8px;border-radius:12px;background:#1a1f27;color:#fff;border:1px solid #333;cursor:pointer}
button:hover{background:#222834}
img{max-width:100%;margin-top:10px;border-radius:12px;border:1px solid #2b313b;background:#0f1115}
.muted{color:#9ca3af;line-height:1.45}
.ok{color:#7ee787;margin-top:10px}
.warn{color:#f0b429;margin-top:10px}
.error{color:#ff8a8a;margin-top:10px}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.results{margin-top:14px;display:grid;gap:8px}
.result-item{padding:12px 14px;border:1px solid #333;border-radius:12px;background:#0f1115;cursor:pointer}
.result-item:hover{background:#1a1f27}
@media (max-width: 760px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">

<div class="block">
<h1>Сканер</h1>
<div class="muted">Ручной сканер работает как клавиатура. Сканируйте браслет в поле ниже.</div>
<input id="scan-input" autofocus placeholder="Сканируйте браслет">
<div id="status" class="muted" style="margin-top:10px">Ожидание сканирования…</div>
</div>

<div class="block">
<h3>Карточка</h3>
<div id="card" class="muted">После сканирования или поиска карточка появится здесь.</div>
<button id="show">Вывести на экран</button>
<button id="clear">Очистить экран</button>
</div>

<div class="block">
<h3>Ручной поиск</h3>
<div class="muted">Если скан не сработал, можно найти гостя вручную по коду или по имени / фамилии.</div>
<div style="margin-top:14px">
  <label class="muted">Excel файл (code, first_name, last_name)</label>
  <input id="excel-file" type="file" accept=".xls,.xlsx">
</div>
<div class="row" style="margin-top:14px">
  <div>
    <label class="muted">Имя</label>
    <input id="first-name" type="text" placeholder="Имя">
  </div>
  <div>
    <label class="muted">Фамилия</label>
    <input id="last-name" type="text" placeholder="Фамилия">
  </div>
  <div>
    <label class="muted">Код</label>
    <input id="code" type="text" placeholder="001">
  </div>
</div>
<div>
  <button id="search-btn">Найти</button>
</div>
<div id="search-results" class="results"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
var scanInput = document.getElementById('scan-input');
var card = document.getElementById('card');
var statusEl = document.getElementById('status');
var currentCode = null;
var lastAcceptedCode = null;
var lastAcceptedAt = 0;
var DUPLICATE_LOCK_MS = 2500;

var guests = [];
var firstNameEl = document.getElementById('first-name');
var lastNameEl = document.getElementById('last-name');
var codeEl = document.getElementById('code');
var searchResultsEl = document.getElementById('search-results');
var excelInput = document.getElementById('excel-file');

function ensureFocus() {
  if (document.activeElement !== scanInput) scanInput.focus();
}

window.addEventListener('load', ensureFocus);
document.addEventListener('click', function(e) {
  var tag = e.target.tagName ? e.target.tagName.toLowerCase() : '';
  if (tag !== 'input') ensureFocus();
});

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function normalizeCode(value) {
  var raw = String(value || '').trim();
  if (!raw) return '';
  if (!/^[0-9]{1,3}$/.test(raw)) return '';
  var code = raw.padStart(3, '0');
  if (code < '001' || code > '999') return '';
  return code;
}

function beep() {
  try {
    var AudioContextCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextCtor) return;
    var ctx = new AudioContextCtor();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 1046;
    gain.gain.value = 0.03;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    setTimeout(function() {
      osc.stop();
      if (ctx.close) ctx.close();
    }, 90);
  } catch (e) {}
}

function renderCard(code, fullName) {
  currentCode = code;
  card.innerHTML = (fullName ? '<div><strong>' + escapeHtml(fullName) + '</strong> — код ' + escapeHtml(code) + '</div>' : '<div><strong>Код: ' + escapeHtml(code) + '</strong></div>') +
                   '<img src="cards/' + code + '.jpg" alt="Карточка ' + code + '">' +
                   '<div id="img-missing" class="muted"></div>';
  var img = card.querySelector('img');
  img.onerror = function () {
    this.style.display = 'none';
    var miss = document.getElementById('img-missing');
    if (miss) miss.textContent = 'Картинка cards/' + code + '.jpg не найдена.';
  };
}

function clearSearchResults() {
  searchResultsEl.innerHTML = '';
}

function fillSearchFields(guest) {
  firstNameEl.value = guest.first_name || '';
  lastNameEl.value = guest.last_name || '';
  codeEl.value = guest.code || '';
}

function findByCode(code) {
  for (var i = 0; i < guests.length; i++) {
    if (guests[i].code === code) return guests[i];
  }
  return null;
}

function searchByName(first, last) {
  var results = [];
  for (var i = 0; i < guests.length; i++) {
    var g = guests[i];
    var firstOk = !first || String(g.first_name).toLowerCase() === first;
    var lastOk = !last || String(g.last_name).toLowerCase() === last;
    if (firstOk && lastOk) results.push(g);
  }
  return results;
}

excelInput.addEventListener('change', function(evt){
  var file = evt.target.files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(e){
    var data = new Uint8Array(e.target.result);
    var wb = XLSX.read(data, {type:'array'});
    var sheet = wb.Sheets[wb.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(sheet, {header:1});

    var header = rows[0] || [];
    var body = rows.slice(1);

    var ci = header.indexOf('code');
    var fi = header.indexOf('first_name');
    var li = header.indexOf('last_name');

    guests = body.map(function(r){
      var code = String(r[ci] || '').trim();
      if (code.length < 3) code = ('000' + code).slice(-3);
      return {
        code: code,
        first_name: String(r[fi] || '').trim(),
        last_name: String(r[li] || '').trim()
      };
    }).filter(function(g){ return g.code; });

    statusEl.className = 'ok';
    statusEl.textContent = 'Excel загружен. Гостей: ' + guests.length;
    ensureFocus();
  };
  reader.readAsArrayBuffer(file);
});

codeEl.addEventListener('input', function() {
  if (codeEl.value.trim()) {
    firstNameEl.value = '';
    lastNameEl.value = '';
  }
});

firstNameEl.addEventListener('input', function() {
  if (firstNameEl.value.trim()) codeEl.value = '';
});

lastNameEl.addEventListener('input', function() {
  if (lastNameEl.value.trim()) codeEl.value = '';
});

document.getElementById('search-btn').addEventListener('click', function() {
  clearSearchResults();

  var code = normalizeCode(codeEl.value);
  var first = firstNameEl.value.trim().toLowerCase();
  var last = lastNameEl.value.trim().toLowerCase();

  if (code) {
    var guestByCode = findByCode(code);
    if (guestByCode) {
      fillSearchFields(guestByCode);
      renderCard(guestByCode.code, guestByCode.first_name + ' ' + guestByCode.last_name);
      statusEl.className = 'ok';
      statusEl.textContent = 'Гость найден по коду: ' + code;
    } else {
      renderCard(code, '');
      statusEl.className = 'warn';
      statusEl.textContent = 'Гостя в Excel не нашли, но карточка по коду показана.';
    }
    ensureFocus();
    return;
  }

  if (!first && !last) {
    statusEl.className = 'warn';
    statusEl.textContent = 'Введите код или имя / фамилию для поиска.';
    ensureFocus();
    return;
  }

  var results = searchByName(first, last);
  if (results.length === 1) {
    fillSearchFields(results[0]);
    renderCard(results[0].code, results[0].first_name + ' ' + results[0].last_name);
    statusEl.className = 'ok';
    statusEl.textContent = 'Найден один гость.';
  } else if (results.length > 1) {
    searchResultsEl.innerHTML = results.map(function(g) {
      return '<div class="result-item" data-code="' + escapeHtml(g.code) + '"><strong>' +
        escapeHtml(g.first_name + ' ' + g.last_name) + '</strong><br><span class="muted">Код: ' + escapeHtml(g.code) + '</span></div>';
    }).join('');
    statusEl.className = 'warn';
    statusEl.textContent = 'Найдено несколько совпадений. Выберите гостя из списка.';
    var items = searchResultsEl.querySelectorAll('.result-item');
    for (var i = 0; i < items.length; i++) {
      items[i].addEventListener('click', function() {
        var code = this.getAttribute('data-code');
        var guest = findByCode(code);
        if (guest) {
          fillSearchFields(guest);
          renderCard(guest.code, guest.first_name + ' ' + guest.last_name);
          clearSearchResults();
          statusEl.className = 'ok';
          statusEl.textContent = 'Гость выбран из списка.';
          ensureFocus();
        }
      });
    }
  } else {
    statusEl.className = 'error';
    statusEl.textContent = 'Ничего не найдено.';
  }
  ensureFocus();
});

scanInput.addEventListener('keydown', function(e) {
  if (e.key !== "Enter") return;

  var val = scanInput.value.trim();
  scanInput.value = '';
  ensureFocus();

  if (!/^[0-9]{1,3}$/.test(val)) {
    statusEl.className = 'error';
    statusEl.textContent = 'Допустимы только коды от 001 до 999.';
    return;
  }

  var code = val.padStart(3, '0');
  if (code < '001' || code > '999') {
    statusEl.className = 'error';
    statusEl.textContent = 'Допустимы только коды от 001 до 999.';
    return;
  }

  var now = Date.now();
  if (lastAcceptedCode === code && (now - lastAcceptedAt) < DUPLICATE_LOCK_MS) {
    statusEl.className = 'warn';
    statusEl.textContent = 'Повторный скан ' + code + ' заблокирован на несколько секунд.';
    return;
  }

  lastAcceptedCode = code;
  lastAcceptedAt = now;
  currentCode = code;
  clearSearchResults();

  fetch('/api/scan', {
    method:'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({code: code})
  }).then(function() {
    var guest = findByCode(code);
    if (guest) {
      fillSearchFields(guest);
      renderCard(code, guest.first_name + ' ' + guest.last_name);
    } else {
      firstNameEl.value = '';
      lastNameEl.value = '';
      codeEl.value = code;
      renderCard(code, '');
    }
    statusEl.className = 'ok';
    statusEl.textContent = 'Скан: ' + code;
    beep();
  }).catch(function() {
    statusEl.className = 'error';
    statusEl.textContent = 'Не удалось отправить скан на сервер.';
  });
});

document.getElementById('show').onclick = function() {
  if (!currentCode) return;
  fetch('/api/select', {
    method:'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({code: currentCode})
  }).then(function() {
    statusEl.className = 'ok';
    statusEl.textContent = 'Карточка ' + currentCode + ' отправлена на внешний экран.';
    ensureFocus();
  });
};

document.getElementById('clear').onclick = function() {
  fetch('/api/select', {
    method:'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({code:'000'})
  }).then(function() {
    statusEl.className = 'muted';
    statusEl.textContent = 'На внешний экран отправлена заглушка 000.';
    ensureFocus();
  });
};
</script>

</body>
</html>
